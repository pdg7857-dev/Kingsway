# One-command local run: `docker compose up`, then open http://localhost:3000
# Runs Postgres and the app together. Auth is skipped locally (no secrets set),
# so it opens straight into the dashboard. Add ANTHROPIC_API_KEY (in a .env file
# next to this one) to enable the document analyzer.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: engine
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/engine
      DIRECT_URL: postgresql://postgres:postgres@db:5432/engine
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: claude-sonnet-4-6
    command: sh -lc "npx prisma db push --skip-generate && (npx prisma db seed || true) && npx next dev -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
